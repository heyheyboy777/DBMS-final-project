<h2>搜尋收藏品</h2>
<form method="GET" action="{% url 'search_product' %}">
    <input type="text" name="q" value="{{ query }}" placeholder="例如：Pokemon Card PSA 10">
    <button type="submit">eBay 搜尋</button>
</form>

<hr>

{% if results %}
    <div style="display: flex; flex-wrap: wrap;">
    {% for item in results %}
        <div style="border: 1px solid #ccc; margin: 10px; padding: 10px; width: 200px;">
            <img src="{{ item.image_url }}" style="width: 100%;">
            <p><strong>{{ item.name }}</strong></p>
            <p>價格：{{ item.price }} {{ item.currency }}</p>
            
            <a href="{% url 'add_to_inventory' %}?external_id={{ item.external_id }}&name={{ item.name }}&price={{ item.price }}&image_url={{ item.image_url }}">
                <button type="button">加入我的清單</button>
            </a>
        </div>
    {% endfor %}
    </div>
{% elif query %}
    <p>找不到相關商品，請更換關鍵字再試試。</p>
{% endif %}
